[custom-science-pack]
#All custom science pack names
#  If you add an entry to this list. Also add that entry to the bottom of 'data.lua' in the 'Archipelago_localised_science_pack_terms' table.
#  As that is the place that decides if this localisation appears, or just the word itself.
#  This table can also be accessed by other mods, and thus can be extended by other mods.

prefix=
#This entry is blank, as english does not require a prefix.

postfix=Science Pack
#The space before the science pack should be added to the end of the individual words.
#As that space at the end of words allows for word chaining.

